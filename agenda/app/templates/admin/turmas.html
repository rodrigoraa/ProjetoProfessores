{% extends "admin/base_admin.html" %}

{% block content %}
<h2 class="mb-4">Gerir Turmas</h2>

<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-header bg-dark text-white">Nova Turma</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome da Turma</label>
                        <input type="text" name="nome" class="form-control" placeholder="Ex: 10º Ano A" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Turno</label>
                        <select name="turno" class="form-select" required>
                            <option value="Manhã">Manhã</option>
                            <option value="Tarde">Tarde</option>
                            <option value="Noite">Noite</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Registar Turma</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-secondary text-white">Turmas Registadas</div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Turno</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in turmas %}
                        <tr>
                            <td>{{ t.id }}</td>
                            <td>{{ t.nome }}</td>
                            <td><span class="badge bg-secondary">{{ t.turno }}</span></td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center">Nenhuma turma registada.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
