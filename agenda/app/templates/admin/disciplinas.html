{% extends "admin/base_admin.html" %}

{% block content %}
<h2 class="mb-4">Gerir Disciplinas</h2>

<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-header bg-dark text-white">Nova Disciplina</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome da Disciplina</label>
                        <input type="text" name="nome" class="form-control" placeholder="Ex: Matemática A" required>
                    </div>
                    <button type="submit" class="btn btn-info w-100 text-dark fw-bold">Registar Disciplina</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-secondary text-white">Disciplinas Registadas</div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome da Disciplina</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in disciplinas %}
                        <tr>
                            <td>{{ d.id }}</td>
                            <td><span class="badge bg-primary fs-6">{{ d.nome }}</span></td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="2" class="text-center">Nenhuma disciplina registada.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
