<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal EESJV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body>
    <div class="auth-card">
        <h2>Acesso Professor</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Nome Completo</label>
            <input type="text" name="nome" placeholder="Seu nome cadastrado" required>
            
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Sua senha" required>

            <button type="submit">Entrar no Sistema</button>
        </form>

        <div class="footer-links">
            <a href="{{ url_for('auth.registrar') }}">Ainda não tem conta? Cadastre-se aqui</a>
            <br><br>
            <a href="{{ url_for('main.index') }}">← Voltar ao Portal</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
